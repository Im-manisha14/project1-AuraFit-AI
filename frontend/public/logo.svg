<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C5A028;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Elegant A with decorative flourish -->
  <g transform="translate(30, 40)">
    <!-- Left leg of A -->
    <path d="M20 120 L50 30 L60 30 L90 120 L75 120 L70 100 L40 100 L35 120 Z" 
          fill="url(#goldGradient)" stroke="url(#goldGradient)" stroke-width="1"/>
    
    <!-- Horizontal bar of A -->
    <rect x="45" y="85" width="20" height="8" fill="url(#goldGradient)"/>
    
    <!-- Right leg extended -->
    <path d="M90 120 L100 90" stroke="url(#goldGradient)" stroke-width="8" fill="none"/>
    
    <!-- Decorative flourish on right side -->
    <path d="M100 90 Q110 85 115 88 Q120 91 118 95 Q125 92 130 95 Q135 98 132 103 Q138 100 142 105 Q145 110 140 115 Q145 113 148 118 Q150 123 145 127 Q148 126 150 130" 
          stroke="url(#goldGradient)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- Additional flourish curves -->
    <path d="M115 88 Q118 92 120 97" stroke="url(#goldGradient)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M125 95 Q128 98 130 103" stroke="url(#goldGradient)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M135 105 Q138 108 140 113" stroke="url(#goldGradient)" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Decorative dots/leaves -->
    <circle cx="122" cy="97" r="2" fill="url(#goldGradient)"/>
    <circle cx="133" cy="105" r="2" fill="url(#goldGradient)"/>
    <circle cx="143" cy="115" r="2" fill="url(#goldGradient)"/>
  </g>
</svg>